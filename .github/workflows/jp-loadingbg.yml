name: JP loadingbg sync

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install azlassets
        run: |
          python -m pip install --upgrade pip
          pip install azlassets

      - name: Download JP loadingbg assets
        run: |
          python -m downloader JP

      # === 下载上一次 Release 的 full 快照（如果存在）===
      - name: Download last full snapshot from Release (if exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_API="https://api.github.com/repos/${{ github.repository }}/releases/tags/jp-loadingbg-latest"

          if curl -fsSL -H "Authorization: token $GITHUB_TOKEN" "$RELEASE_API" > release.json; then
            URL=$(jq -r '.assets[] | select(.name=="loadingbg_full.zip") | .browser_download_url' release.json)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              curl -L -o loadingbg_full.zip "$URL"
              unzip -q loadingbg_full.zip
              mv current_loadingbg last_loadingbg
            fi
          fi

      # === 收集本次下载的 loadingbg ===
      - name: Collect loadingbg
        run: |
          python scripts/collect_loadingbg.py

      # === 生成 diff + zip，并写 has_diff.flag ===
      - name: Diff and zip
        run: |
          bash scripts/diff_and_zip.sh

      # === 读取 diff 状态 ===
      - name: Read diff status
        id: diffcheck
        run: |
          echo "has_diff=$(cat has_diff.flag)" >> $GITHUB_OUTPUT

      # === 生成元信息 ===
      - name: Generate meta info
        run: |
          echo "client=JP" > meta.txt
          echo "generated_at=$(date -u)" >> meta.txt
          echo "has_diff=${{ steps.diffcheck.outputs.has_diff }}" >> meta.txt

      # === 发布 / 更新 Release ===
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jp-loadingbg-latest
          name: JP loadingbg latest
          body: |
            Automated manual sync of Azur Lane JP loadingbg assetbundles.

            Changes detected: ${{ steps.diffcheck.outputs.has_diff }}

            - Full snapshot: loadingbg_full.zip
            - Diff snapshot: only published when changes exist
          files: |
            loadingbg_full.zip
            meta.txt
            ${{ steps.diffcheck.outputs.has_diff == 'true' && 'loadingbg_diff.zip' || '' }}
